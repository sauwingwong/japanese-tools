<!-- Inline askGemini — see listening-quiz.html for rationale. -->
<script>
(function(root){
  var P='gemini-cache/',D=7;
  function g(k){try{var r=localStorage.getItem(P+k);if(!r)return null;var p=JSON.parse(r);if(typeof p.exp==='number'&&p.exp<Date.now()){localStorage.removeItem(P+k);return null;}return p.value;}catch(_e){return null;}}
  function s(k,v,t){try{localStorage.setItem(P+k,JSON.stringify({value:v,exp:Date.now()+t*86400000}));}catch(_e){}}
  root.askGemini=function(prompt,opts){opts=opts||{};var t=typeof opts.ttlDays==='number'?opts.ttlDays:D;if(opts.cacheKey&&opts.bypassCache!==true){var h=g(opts.cacheKey);if(h!==null)return Promise.resolve(h);}
    var b={prompt:prompt};if(opts.schema)b.schema=opts.schema;if(typeof opts.temperature==='number')b.temperature=opts.temperature;if(opts.model)b.model=opts.model;
    return fetch('/api/gemini',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(b),signal:opts.signal}).then(function(r){if(!r.ok)return r.json().then(function(j){throw new Error('Gemini failed: '+(j&&j.error||r.status));},function(){throw new Error('Gemini failed: HTTP '+r.status);});return r.json();}).then(function(d){if(opts.cacheKey)s(opts.cacheKey,d.text,t);return d.text;});};
  root.clearGeminiCache=function(k){try{localStorage.removeItem(P+k);}catch(_e){}};
  root.clearAllGeminiCache=function(){try{var ks=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf(P)===0)ks.push(k);}for(var j=0;j<ks.length;j++)localStorage.removeItem(ks[j]);}catch(_e){}};
})(window);
</script>
<script type="module">
import { createSRS } from '/js/srs.js';
import ttsCache from '/js/tts-cache.js';
const askGemini = window.askGemini;

const data = await fetch('/data/kanji-n5n4.json').then(r => r.json());
const ALL = data.kanji;
const srs = createSRS('n5n4-kanji', { sync: true });

let level = localStorage.getItem('kanji-level') || 'all';
let mode = localStorage.getItem('kanji-mode') || 'kanji-to-reading';
let current = null;
let answered = false;
let correct = 0, total = 0;

function poolForLevel() {
  return level === 'all' ? ALL : ALL.filter(k => k.level === level);
}

function updateStats() {
  const ids = poolForLevel().map(k => k.kanji);
  const s = srs.stats(ids);
  document.getElementById('stat-known').textContent = s.known;
  document.getElementById('stat-learning').textContent = s.learning;
  document.getElementById('stat-struggling').textContent = s.struggling;
  const dueEl = document.getElementById('stat-due');
  const newEl = document.getElementById('stat-new');
  if (dueEl) dueEl.textContent = s.due;
  if (newEl) newEl.textContent = Math.max(0, s.newPerDay - s.newToday);
}

document.querySelectorAll('#filter-bar button').forEach(b => {
  b.addEventListener('click', () => {
    level = b.dataset.level;
    localStorage.setItem('kanji-level', level);
    document.querySelectorAll('#filter-bar button').forEach(x => x.classList.toggle('active', x.dataset.level === level));
    updateStats(); next();
  });
});
document.querySelectorAll('#mode-bar button').forEach(b => {
  b.addEventListener('click', () => {
    mode = b.dataset.mode;
    localStorage.setItem('kanji-mode', mode);
    document.querySelectorAll('#mode-bar button').forEach(x => x.classList.toggle('active', x.dataset.mode === mode));
    next();
  });
});
document.getElementById('reset-btn').addEventListener('click', (e) => {
  e.preventDefault();
  if (confirm('Reset kanji SRS progress?')) { srs.reset(); updateStats(); next(); }
});

// Init active buttons from stored level/mode
document.querySelectorAll('#filter-bar button').forEach(x => x.classList.toggle('active', x.dataset.level === level));
document.querySelectorAll('#mode-bar button').forEach(x => x.classList.toggle('active', x.dataset.mode === mode));

// ── Gemini: example sentence for in-context mode ──
const exampleSchema = {
  type: 'object',
  properties: {
    ja: { type: 'string' },
    reading: { type: 'string' },
    en: { type: 'string' }
  },
  required: ['ja','reading','en']
};

async function getExample(k) {
  const prompt = `Write ONE short ${k.level}-level Japanese sentence (8-15 mora) that naturally uses the kanji "${k.kanji}" (meaning: ${k.meaning_en}; common readings — on: ${k.on.join(', ')||'—'}; kun: ${k.kun.join(', ')||'—'}). Return JSON {ja, reading, en}. "reading" = the hiragana reading of "${k.kanji}" *as used in this sentence*.`;
  try {
    return await askGemini(prompt, {
      schema: exampleSchema,
      cacheKey: 'kanji/' + k.kanji,
      ttlDays: 30
    });
  } catch(e) { console.warn('example failed', e); return null; }
}

async function getCoach(k, wrongPick) {
  const prompt = `A JLPT ${k.level} learner was asked to read the kanji "${k.kanji}" (meaning: ${k.meaning_en}). They picked "${wrongPick}". The correct common readings are on: ${k.on.join(', ')||'—'}, kun: ${k.kun.join(', ')||'—'}. In 2-3 short English sentences, explain the mistake and give a quick mnemonic. Plain prose, no markdown.`;
  try { return await askGemini(prompt, { temperature: 0.4 }); }
  catch { return `Correct readings — on: ${k.on.join(', ')||'—'}, kun: ${k.kun.join(', ')||'—'}. Meaning: ${k.meaning_en}.`; }
}

// ── TTS ──
let _ctx = null;
let _currentSource = null;
// iOS flips AudioContext to 'interrupted' after backgrounding; rebuild on
// dead states instead of relying on resume() alone.
function _getCtx() {
  const dead = !_ctx || _ctx.state === 'closed' || _ctx.state === 'interrupted';
  if (dead) {
    try { _ctx && _ctx.close(); } catch (e) {}
    _ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _ctx;
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    try { _getCtx().resume(); } catch (e) {}
  }
});
window.addEventListener('pagehide', () => {
  try { if (_currentSource) _currentSource.stop(); } catch (e) {}
  try { if (_ctx) _ctx.close(); } catch (e) {}
  _ctx = null; _currentSource = null;
});
async function speak(text, opts) {
  opts = opts || {};
  try {
    const body = { text };
    if (opts.model) body.model = opts.model;
    const cacheKey = ttsCache.makeKey(text, { model: opts.model, voice: opts.voice });
    let audio = null;
    try { audio = await ttsCache.get(cacheKey); } catch {}
    if (!audio) {
      const res = await fetch('/api/tts', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if (!res.ok) return;
      ({ audio } = await res.json());
      if (audio) ttsCache.put(cacheKey, audio, { model: opts.model, voice: opts.voice }).catch(() => {});
    }
    const bytes = Uint8Array.from(atob(audio), c => c.charCodeAt(0));
    let ctx = _getCtx();
    if (ctx.state !== 'running') { try { await ctx.resume(); } catch (e) {} }
    const pcm = new Int16Array(bytes.buffer);
    const playInto = (activeCtx) => {
      const buf = activeCtx.createBuffer(1, pcm.length, 24000);
      const ch = buf.getChannelData(0);
      for (let i = 0; i < pcm.length; i++) ch[i] = pcm[i] / 32768;
      const src = activeCtx.createBufferSource();
      src.buffer = buf; src.connect(activeCtx.destination); src.start();
      _currentSource = src;
    };
    try { playInto(ctx); }
    catch (err) {
      _ctx = null;
      ctx = _getCtx();
      if (ctx.state !== 'running') await ctx.resume();
      try { playInto(ctx); } catch (err2) {}
    }
  } catch(e) {}
}

// ── Helpers ──
function allReadings(k) {
  return [...k.on, ...k.kun.map(x => katakanaToHiragana(x))].filter(Boolean);
}
function katakanaToHiragana(s) {
  return s.replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
}
function pickDistractors(n, pool, excludeSet) {
  const shuffled = pool.filter(x => !excludeSet.has(x)).sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

// ── Question rendering ──
async function next() {
  answered = false;
  const area = document.getElementById('question-area');
  area.innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';

  const pool = poolForLevel();
  if (!pool.length) return;
  const id = srs.pickNext(pool.map(k => k.kanji), { avoidIds: current ? [current.kanji] : [] });
  current = pool.find(k => k.kanji === id);

  if (mode === 'kanji-to-reading' || mode === 'in-context') {
    await renderKanjiToReading(area, mode === 'in-context');
  } else {
    renderReadingToKanji(area);
  }
}

async function renderKanjiToReading(area, withSentence) {
  const k = current;
  const disp = document.createElement('div');
  disp.className = 'kanji-display';
  disp.innerHTML = k.kanji + ` <span class="level-tag">${k.level}</span>`;
  area.appendChild(disp);

  if (withSentence) {
    const loading = document.createElement('div');
    loading.className = 'prompt';
    loading.textContent = 'Loading example sentence…';
    area.appendChild(loading);

    const ex = await getExample(k);
    loading.remove();

    if (ex) {
      const s = document.createElement('div');
      s.className = 'sentence-display';
      // Highlight kanji in sentence
      const highlighted = escapeHtml(ex.ja).replace(new RegExp(k.kanji, 'g'), `<span class="target">${k.kanji}</span>`);
      s.innerHTML = highlighted;
      area.appendChild(s);
      const en = document.createElement('div');
      en.className = 'sentence-en';
      en.textContent = ex.en;
      area.appendChild(en);
      const pb = document.createElement('div');
      pb.style.textAlign = 'center';
      pb.innerHTML = '<button class="play-btn">🔊 Play sentence</button>' +
        ' <button class="play-btn" style="margin-left:6px; background:#fffaf0; color:#7a5200; border:1px solid #ffca28;" title="Rich voice (Gemini 3.1)">✨ Rich</button>';
      const [playBtn, richBtn] = pb.querySelectorAll('button');
      playBtn.onclick = () => speak(ex.ja);
      richBtn.onclick = () => speak(ex.ja, { model: 'gemini-3.1-flash-tts-preview' });
      area.appendChild(pb);

      current._contextReading = ex.reading; // store for grading
    }
  }

  const prompt = document.createElement('div');
  prompt.className = 'prompt';
  prompt.textContent = withSentence
    ? 'What is the reading of the highlighted kanji in this sentence?'
    : 'What is a reading of this kanji?';
  area.appendChild(prompt);

  const meta = document.createElement('div');
  meta.className = 'kanji-meta';
  meta.textContent = `Meaning: ${k.meaning_en}`;
  area.appendChild(meta);

  const grid = document.createElement('div');
  grid.id = 'options-grid';
  area.appendChild(grid);

  // Correct answer set
  const correctSet = new Set(allReadings(k));
  // If context mode, correct = specific reading from example
  let correctLabel;
  if (withSentence && current._contextReading) {
    correctLabel = current._contextReading;
  } else {
    const list = allReadings(k);
    correctLabel = list[0] || k.meaning_en;
  }

  // Distractor pool: readings of other kanji at same level
  const otherReadings = [];
  for (const other of ALL) {
    if (other.kanji !== k.kanji) otherReadings.push(...allReadings(other));
  }
  const distractors = pickDistractors(3, [...new Set(otherReadings)], correctSet);

  const opts = [
    { label: correctLabel, correct: true },
    ...distractors.map(d => ({ label: d, correct: false }))
  ].sort(() => Math.random() - 0.5);

  renderOptions(grid, opts);

  const fb = document.createElement('div');
  fb.id = 'feedback';
  area.appendChild(fb);
  const coach = document.createElement('div');
  coach.id = 'coach-box';
  area.appendChild(coach);
}

function renderReadingToKanji(area) {
  const k = current;
  const reading = allReadings(k)[0] || k.meaning_en;

  const disp = document.createElement('div');
  disp.className = 'kanji-display';
  disp.style.fontSize = '2.5rem';
  disp.innerHTML = reading + ` <span class="level-tag">${k.level}</span>`;
  area.appendChild(disp);

  const meta = document.createElement('div');
  meta.className = 'kanji-meta';
  meta.textContent = `Meaning: ${k.meaning_en}`;
  area.appendChild(meta);

  const prompt = document.createElement('div');
  prompt.className = 'prompt';
  prompt.textContent = 'Which kanji matches this reading & meaning?';
  area.appendChild(prompt);

  const grid = document.createElement('div');
  grid.id = 'options-grid';
  area.appendChild(grid);

  const pool = poolForLevel().filter(x => x.kanji !== k.kanji);
  const distractors = pool.sort(() => Math.random() - 0.5).slice(0, 3);
  const opts = [
    { label: k.kanji, correct: true },
    ...distractors.map(d => ({ label: d.kanji, correct: false }))
  ].sort(() => Math.random() - 0.5);

  renderOptions(grid, opts);
  const fb = document.createElement('div'); fb.id = 'feedback'; area.appendChild(fb);
  const coach = document.createElement('div'); coach.id = 'coach-box'; area.appendChild(coach);
}

function renderOptions(grid, opts) {
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = o.label;
    btn.addEventListener('click', () => handleAnswer(o, btn, opts));
    grid.appendChild(btn);
  });
}

async function handleAnswer(pick, btn, opts) {
  if (answered) return;
  answered = true;
  total++;
  const fb = document.getElementById('feedback');

  if (pick.correct) {
    correct++;
    srs.recordResult(current.kanji, true);
    btn.classList.add('correct');
    fb.textContent = '✓ Correct!';
    fb.className = 'correct';
  } else {
    srs.recordResult(current.kanji, false);
    btn.classList.add('wrong');
    // Reveal correct option (buttons are in `opts` order within the grid).
    [...document.querySelectorAll('.opt')].forEach((b, i) => {
      if (opts[i] && opts[i].correct) b.classList.add('correct');
    });
    fb.textContent = '✗ See coach below';
    fb.className = 'wrong';
    const coach = document.getElementById('coach-box');
    coach.classList.add('visible');
    coach.innerHTML = '<div class="coach-label">COACH</div>Thinking…';
    const expl = await getCoach(current, pick.label);
    coach.innerHTML = '<div class="coach-label">COACH</div>' + escapeHtml(expl);
  }

  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  document.getElementById('score').textContent = `${correct} / ${total}`;
  updateStats();
  document.getElementById('next-btn').style.display = 'inline-block';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('next-btn').addEventListener('click', next);

updateStats();
next();
</script>

<script src="/js/sw-register.js" defer></script>
</body>
