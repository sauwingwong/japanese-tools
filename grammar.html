<!-- Inline askGemini — iOS Safari (installed PWA) intermittently fails to
     load /js/gemini.js via both module and classic script tags. Inlining
     sidesteps the SW cache + parse pipeline entirely. -->
<script>
(function(root){
  var P='gemini-cache/',D=7;
  function g(k){try{var r=localStorage.getItem(P+k);if(!r)return null;var p=JSON.parse(r);if(typeof p.exp==='number'&&p.exp<Date.now()){localStorage.removeItem(P+k);return null;}return p.value;}catch(_e){return null;}}
  function s(k,v,t){try{localStorage.setItem(P+k,JSON.stringify({value:v,exp:Date.now()+t*86400000}));}catch(_e){}}
  root.askGemini=function(prompt,opts){opts=opts||{};var t=typeof opts.ttlDays==='number'?opts.ttlDays:D;if(opts.cacheKey&&opts.bypassCache!==true){var h=g(opts.cacheKey);if(h!==null)return Promise.resolve(h);}
    var b={prompt:prompt};if(opts.schema)b.schema=opts.schema;if(typeof opts.temperature==='number')b.temperature=opts.temperature;if(opts.model)b.model=opts.model;
    return fetch('/api/gemini',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(b),signal:opts.signal}).then(function(r){if(!r.ok)return r.json().then(function(j){throw new Error('Gemini failed: '+(j&&j.error||r.status));},function(){throw new Error('Gemini failed: HTTP '+r.status);});return r.json();}).then(function(d){if(opts.cacheKey)s(opts.cacheKey,d.text,t);return d.text;});};
  root.clearGeminiCache=function(k){try{localStorage.removeItem(P+k);}catch(_e){}};
  root.clearAllGeminiCache=function(){try{var ks=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf(P)===0)ks.push(k);}for(var j=0;j<ks.length;j++)localStorage.removeItem(ks[j]);}catch(_e){}};
})(window);
</script>
<script type="module">
import { createSRS, presence } from '/js/srs.js';
import ttsCache from '/js/tts-cache.js';
import { createSession } from '/js/session.js';
const askGemini = window.askGemini;

// ── Load seed ──
const data = await fetch('/data/grammar-n5n4.json').then(r => r.json());
const ALL_PATTERNS = data.patterns;

const srs = createSRS('n5n4-grammar', { sync: true });

let level = localStorage.getItem('grammar-level') || 'all';
let mode = localStorage.getItem('grammar-mode') || 'form-to-meaning';
// Migrate from now-removed cloze mode.
if (mode === 'cloze') mode = 'compose';
let current = null;
let answered = false;
const SESSION_LENGTH = 12;

const session = createSession({
  length: SESSION_LENGTH,
  hudEl: document.getElementById('session-hud'),
  endEl: document.getElementById('session-end'),
  poolSize: () => poolForLevel().length,
  retention7d: () => srs.retention7d(),
  onComplete: (s) => {
    document.querySelector('main .card').style.display = 'none';
    if (current && current.id) {
      presence.markStudied({ lastItem: current.pattern || current.id, lastSlice: 'grammar' });
    }
  },
  onReset: () => {
    document.querySelector('main .card').style.display = '';
    session.start();
    next();
  },
});

function poolForLevel() {
  return level === 'all' ? ALL_PATTERNS : ALL_PATTERNS.filter(p => p.level === level);
}

// ── Filter / mode bars ──
function applyLevel() {
  document.querySelectorAll('#filter-bar button').forEach(b => {
    b.classList.toggle('active', b.dataset.level === level);
  });
  localStorage.setItem('grammar-level', level);
  updateStats();
  document.querySelector('main .card').style.display = '';
  session.start();
  next();
}
function applyMode() {
  document.querySelectorAll('#mode-bar button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  localStorage.setItem('grammar-mode', mode);
  document.querySelector('main .card').style.display = '';
  session.start();
  next();
}
document.querySelectorAll('#filter-bar button').forEach(b => {
  b.addEventListener('click', () => { level = b.dataset.level; applyLevel(); });
});
document.querySelectorAll('#mode-bar button').forEach(b => {
  b.addEventListener('click', () => { mode = b.dataset.mode; applyMode(); });
});

// ── Stats ──
function updateStats() {
  const ids = poolForLevel().map(p => p.id);
  const s = srs.stats(ids);
  document.getElementById('stat-known').textContent = s.known;
  document.getElementById('stat-learning').textContent = s.learning;
  document.getElementById('stat-struggling').textContent = s.struggling;
  const dueEl = document.getElementById('stat-due');
  const newEl = document.getElementById('stat-new');
  if (dueEl) dueEl.textContent = s.due;
  if (newEl) newEl.textContent = Math.max(0, s.newPerDay - s.newToday);
}

// ── Reset ──
document.getElementById('reset-btn').addEventListener('click', (e) => {
  e.preventDefault();
  if (confirm('Reset grammar SRS progress?')) {
    srs.reset(); updateStats();
    document.querySelector('main .card').style.display = '';
    session.start(); next();
  }
});

// ── Example sentences via Gemini (cached) ──
const exampleSchema = {
  type: 'object',
  properties: {
    sentences: {
      type: 'array',
      items: {
        type: 'object',
        properties: {
          ja: { type: 'string' },
          en: { type: 'string' }
        },
        required: ['ja','en']
      }
    }
  },
  required: ['sentences']
};

async function getExamples(pattern) {
  const prompt = `Write 3 short ${pattern.level}-level Japanese sentences using the grammar pattern "${pattern.pattern}" (meaning: ${pattern.meaning_en}). Use simple JLPT ${pattern.level} vocabulary. Return JSON {sentences: [{ja, en}, ...]}.`;
  try {
    return await askGemini(prompt, {
      schema: exampleSchema,
      cacheKey: 'grammar/' + pattern.id,
      ttlDays: 30
    });
  } catch (e) {
    console.warn('Example fetch failed:', e);
    return { sentences: [] };
  }
}

// ── Coach (wrong-answer explanation) ──
async function getCoach(pattern, wrongPick) {
  const prompt = `A Japanese learner (JLPT ${pattern.level}) was asked about the grammar pattern "${pattern.pattern}" (correct meaning: "${pattern.meaning_en}"). They picked the wrong answer: "${wrongPick}". In 2-3 short English sentences, explain why that is wrong and give a tiny memory hook. Plain prose, no markdown.`;
  try {
    const text = await askGemini(prompt, { temperature: 0.4 });
    return text;
  } catch (e) {
    return `The correct meaning is "${pattern.meaning_en}". Your pick was "${wrongPick}" — review the form "${pattern.form}".`;
  }
}

// ── Speech (delegate to phoneme-trainer's pattern: use Gemini TTS via /api/tts) ──
let _audioCtx = null;
let _currentSource = null;
// iOS flips AudioContext to 'interrupted' after backgrounding; rebuild on
// dead states instead of relying on resume() alone.
function _getAudioCtx() {
  const dead = !_audioCtx || _audioCtx.state === 'closed' || _audioCtx.state === 'interrupted';
  if (dead) {
    try { _audioCtx && _audioCtx.close(); } catch (e) {}
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _audioCtx;
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    try { _getAudioCtx().resume(); } catch (e) {}
  }
});
window.addEventListener('pagehide', () => {
  try { if (_currentSource) _currentSource.stop(); } catch (e) {}
  try { if (_audioCtx) _audioCtx.close(); } catch (e) {}
  _audioCtx = null; _currentSource = null;
});
async function speak(text, opts) {
  opts = opts || {};
  try {
    const body = { text };
    if (opts.model) body.model = opts.model;
    const cacheKey = ttsCache.makeKey(text, { model: opts.model, voice: opts.voice });
    let audio = null;
    try { audio = await ttsCache.get(cacheKey); } catch {}
    if (!audio) {
      const res = await fetch('/api/tts', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) return;
      ({ audio } = await res.json());
      if (audio) ttsCache.put(cacheKey, audio, { model: opts.model, voice: opts.voice }).catch(() => {});
    }
    const bytes = Uint8Array.from(atob(audio), c => c.charCodeAt(0));
    let ctx = _getAudioCtx();
    if (ctx.state !== 'running') { try { await ctx.resume(); } catch (e) {} }
    const pcm = new Int16Array(bytes.buffer);
    const playInto = (activeCtx) => {
      const buf = activeCtx.createBuffer(1, pcm.length, 24000);
      const ch = buf.getChannelData(0);
      for (let i = 0; i < pcm.length; i++) ch[i] = pcm[i] / 32768;
      const src = activeCtx.createBufferSource();
      src.buffer = buf; src.connect(activeCtx.destination); src.start();
      _currentSource = src;
    };
    try { playInto(ctx); }
    catch (err) {
      // Context died between fetch and start — rebuild + retry once.
      _audioCtx = null;
      ctx = _getAudioCtx();
      if (ctx.state !== 'running') await ctx.resume();
      try { playInto(ctx); } catch (err2) { console.warn('TTS retry failed:', err2); }
    }
  } catch (e) { console.warn('TTS failed:', e); }
}

// ── Question generation ──
function pickDistractors(correctPattern, n, byField) {
  const others = ALL_PATTERNS.filter(p => p.id !== correctPattern.id);
  const shuffled = others.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n).map(p => p[byField]);
}

// ── Composition prompt + grader ──
const composePromptSchema = {
  type: 'object',
  properties: { en: { type: 'string' } },
  required: ['en'],
};
async function getComposePrompt(pattern) {
  // Per-pattern English prompt sentence. Cached so repeats reuse the same prompt.
  const text = await askGemini(
    `Suggest ONE short English sentence (8-15 words, everyday topic, JLPT ${pattern.level} appropriate vocabulary) that a learner could naturally translate into Japanese using the grammar pattern "${pattern.pattern}" (${pattern.meaning_en}). Output ONLY a JSON object {en: "…"}. The sentence should *require* the target pattern, not be naturally expressible without it.`,
    { schema: composePromptSchema, cacheKey: 'grammar-compose/' + pattern.id, ttlDays: 30, temperature: 0.5 }
  );
  let data = text;
  if (typeof text === 'string') { try { data = JSON.parse(text); } catch { data = { en: text }; } }
  return (data && data.en) || pattern.meaning_en;
}

const gradeSchema = {
  type: 'object',
  properties: {
    score: { type: 'integer' },
    correctVersion: { type: 'string' },
    feedback: { type: 'string' },
  },
  required: ['score', 'correctVersion', 'feedback'],
};
async function gradeComposition(pattern, english, learnerJa) {
  const prompt =
    `Grade this learner's Japanese sentence against the target.\n` +
    `Target English: "${english}"\n` +
    `Target grammar pattern: ${pattern.pattern} (${pattern.meaning_en})\n` +
    `Learner Japanese: "${learnerJa}"\n` +
    `Return JSON {score: 0|1|2, correctVersion: "natural Japanese reference using the target pattern", feedback: "≤2 short English sentences explaining the score"}. ` +
    `Score 2 = correct (uses pattern, natural, minor typos OK). ` +
    `Score 1 = partial (almost right, e.g. wrong particle or missing kana). ` +
    `Score 0 = wrong or pattern not used.`;
  const text = await askGemini(prompt, { schema: gradeSchema, temperature: 0.2 });
  let data = text;
  if (typeof text === 'string') { try { data = JSON.parse(text); } catch { throw new Error('Bad grader JSON'); } }
  return data;
}

async function next() {
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('coach-box').classList.remove('visible', 'loading');
  document.getElementById('coach-box').innerHTML = '';
  document.getElementById('example').classList.remove('visible');
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('compose-area').style.display = 'none';
  document.getElementById('compose-result').innerHTML = '';
  const ci = document.getElementById('compose-input');
  ci.value = '';
  ci.disabled = false;
  document.getElementById('compose-submit').disabled = false;

  const pool = poolForLevel();
  if (!pool.length) return;
  const id = srs.pickNext(pool.map(p => p.id), { avoidIds: current ? [current.id] : [] });
  current = pool.find(p => p.id === id);

  const patternDisplay = document.getElementById('pattern-ja');
  const patternForm = document.getElementById('pattern-form');
  const promptText = document.getElementById('prompt-text');
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';

  const levelBadge = `<span class="level-tag">${current.level}</span>`;

  if (mode === 'form-to-meaning') {
    grid.style.display = '';
    patternDisplay.innerHTML = current.pattern + levelBadge;
    patternForm.textContent = current.form;
    promptText.textContent = 'What does this pattern mean?';
    const opts = [
      { label: current.meaning_en, correct: true },
      ...pickDistractors(current, 3, 'meaning_en').map(m => ({ label: m, correct: false }))
    ].sort(() => Math.random() - 0.5);
    renderOpts(opts);
  } else if (mode === 'meaning-to-form') {
    grid.style.display = '';
    patternDisplay.innerHTML = '“' + current.meaning_en + '”' + levelBadge;
    patternForm.textContent = '';
    promptText.textContent = 'Which pattern matches?';
    const opts = [
      { label: current.pattern, correct: true },
      ...pickDistractors(current, 3, 'pattern').map(p => ({ label: p, correct: false }))
    ].sort(() => Math.random() - 0.5);
    renderOpts(opts);
  } else if (mode === 'compose') {
    grid.style.display = 'none';
    patternDisplay.innerHTML = current.pattern + levelBadge;
    patternForm.textContent = current.meaning_en + ' · ' + current.form;
    promptText.textContent = 'Loading prompt…';
    document.getElementById('compose-area').style.display = 'block';
    try {
      const en = await getComposePrompt(current);
      promptText.innerHTML = `Translate into Japanese using <strong>${escapeHtml(current.pattern)}</strong>:<br>` +
        `<span style="display:inline-block; margin-top:6px; font-size:1rem; color:#1a237e;">“${escapeHtml(en)}”</span>`;
      document.getElementById('compose-input').dataset.english = en;
      document.getElementById('compose-input').focus();
    } catch (e) {
      promptText.textContent = 'Couldn\'t fetch prompt — try Next.';
    }
  }
}

function renderOpts(opts) {
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = o.label;
    btn.addEventListener('click', () => handleAnswer(o, btn));
    grid.appendChild(btn);
  });
}

async function handleAnswer(pick, btn) {
  if (answered) return;
  answered = true;
  const fb = document.getElementById('feedback');
  const isCorrect = !!pick.correct;
  srs.recordResult(current.id, isCorrect);
  session.recordAnswer({
    id: current.id,
    correct: isCorrect,
    label: current.pattern,
    meaning: current.meaning_en,
  });

  if (isCorrect) {
    btn.classList.add('correct');
    fb.textContent = '✓ Correct!';
    fb.className = 'correct';
  } else {
    btn.classList.add('wrong');
    const correctOpt = [...document.querySelectorAll('.opt')].find(b => {
      return b.textContent === (mode === 'form-to-meaning' ? current.meaning_en : current.pattern);
    });
    if (correctOpt) correctOpt.classList.add('correct');
    fb.textContent = '✗ Not quite — see coach below';
    fb.className = 'wrong';

    const coach = document.getElementById('coach-box');
    coach.classList.add('visible', 'loading');
    coach.innerHTML = '<div class="coach-label">COACH</div>Thinking…';
    const explanation = await getCoach(current, pick.label);
    coach.classList.remove('loading');
    coach.innerHTML = '<div class="coach-label">COACH</div>' + escapeHtml(explanation);
  }

  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  updateStats();

  // Example sentence
  const ex = await getExamples(current);
  const s = ex.sentences && ex.sentences[0];
  if (s) {
    document.getElementById('ex-ja').textContent = s.ja;
    document.getElementById('ex-en').textContent = s.en;
    document.getElementById('example').classList.add('visible');
    document.getElementById('ex-speak').onclick = () => speak(s.ja);
    document.getElementById('ex-speak-rich').onclick = () => speak(s.ja, { model: 'gemini-3.1-flash-tts-preview' });
  }

  document.getElementById('next-btn').style.display = 'inline-block';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('next-btn').addEventListener('click', () => {
  if (session.advance()) next();
});

// ── Compose submit handler ──
document.getElementById('compose-submit').addEventListener('click', async () => {
  if (answered) return;
  const ta = document.getElementById('compose-input');
  const learnerJa = (ta.value || '').trim();
  if (!learnerJa) { ta.focus(); return; }
  const english = ta.dataset.english || current.meaning_en;
  const result = document.getElementById('compose-result');
  result.innerHTML = '<span style="color:#888;">✨ Grading…</span>';
  const submitBtn = document.getElementById('compose-submit');
  submitBtn.disabled = true;
  let g;
  try {
    g = await gradeComposition(current, english, learnerJa);
  } catch (e) {
    result.innerHTML = '<span style="color:#c62828;">⚠ Grader failed: ' + escapeHtml(e.message || 'unknown') + '</span>';
    submitBtn.disabled = false;
    return;
  }
  answered = true;
  const score = Number(g.score) || 0;
  // Score 1 (partial) counts as correct in SRS but flagged as 'almost' in review.
  const isCorrect = score >= 1;
  srs.recordResult(current.id, score === 2);
  session.recordAnswer({
    id: current.id,
    correct: isCorrect,
    label: current.pattern + (score === 1 ? ' (almost)' : ''),
    meaning: current.meaning_en,
    userPick: learnerJa,
  });

  const badge = score === 2
    ? '<span style="color:#2e7d32; font-weight:600;">✓ Correct</span>'
    : score === 1
      ? '<span style="color:#e65100; font-weight:600;">△ Almost</span>'
      : '<span style="color:#c62828; font-weight:600;">✗ Off</span>';
  result.innerHTML = `
    <div style="background:#f8f8f8; border-radius:8px; padding:10px 12px; line-height:1.55;">
      <div>${badge}</div>
      <div style="margin-top:6px;"><strong>You:</strong> ${escapeHtml(learnerJa)}</div>
      <div style="margin-top:2px;"><strong>Reference:</strong> ${escapeHtml(g.correctVersion || '')}</div>
      <div style="margin-top:6px; color:#5d4037; font-size:0.88rem;">${escapeHtml(g.feedback || '')}</div>
    </div>
  `;
  ta.disabled = true;
  updateStats();
  document.getElementById('next-btn').style.display = 'inline-block';
});

// Boot
session.start();
applyLevel();
applyMode();
</script>
