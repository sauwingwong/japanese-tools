<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Listening Quiz</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1a237e">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Japanese">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
/* Native-app polish: kill iOS blue tap highlight, long-press callout, pull-to-refresh. */
html, body { overscroll-behavior-y: contain; }
body {
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f4ff; color: #222; min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
button, a, select, .opt, .cat-btn {
  -webkit-tap-highlight-color: transparent;
}

header {
  background: #1a237e; color: white;
  padding: 14px 20px; padding-top: calc(14px + env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
header h1 { font-size: 1.3rem; font-weight: 600; }
#voice-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
#voice-select { padding: 4px 8px; border-radius: 4px; border: none; font-size: 0.82rem; max-width: 210px; }
.home-btn {
  color: white; text-decoration: none; font-size: 0.8rem;
  border: 1px solid rgba(255,255,255,0.45); border-radius: 16px;
  padding: 4px 11px; opacity: 0.8; white-space: nowrap;
  transition: opacity 0.15s, background 0.15s;
}
.home-btn:hover { opacity: 1; background: rgba(255,255,255,0.15); }

.container { max-width: 720px; margin: 0 auto; padding: 20px 14px 100px; }

/* Shared bottom tab bar — kept identical across pages so navigation is
   consistent everywhere. Accent color comes from the page's theme-color. */
.nav-tabs {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  background: #fff; border-top: 1px solid #e0e0e0;
  display: flex; justify-content: space-around;
  padding: 7px 0; padding-bottom: calc(7px + env(safe-area-inset-bottom));
  /* Inset the outermost tabs away from the iPhone rounded corners. In
     portrait safe-area-inset-left/right are 0, so use max() to always
     reserve at least 14 px. */
  padding-left: max(30px, env(safe-area-inset-left));
  padding-right: max(30px, env(safe-area-inset-right));
}
.tabi {
  font-size: 0.66rem; text-decoration: none; color: #888; text-align: center;
  padding: 2px 4px; flex: 1; min-width: 0;
}
.tabi-ico { display: block; font-size: 1.15rem; margin-bottom: 2px; }
.tabi.active { color: #1a237e; font-weight: 600; }

/* Desktop horizontal tab bar (≥900px). See CLAUDE.md §nav. */
.nav-desktop { display: none; }
@media (min-width: 900px) {
  .nav-desktop {
    display: flex; gap: 6px; padding: 10px 30px;
    background: #fff; border-bottom: 1px solid #e5e7eb;
    justify-content: center; flex-wrap: wrap;
  }
  .nav-desktop a {
    padding: 8px 14px; border-radius: 8px;
    color: #374151; text-decoration: none; font-weight: 600; font-size: 0.88rem;
  }
  .nav-desktop a.active { background: #1a237e; color: #fff; }
  .nav-desktop a:hover { background: #f3f4f6; }
  .nav-desktop a.active:hover { background: #0d133d; }
  .nav-tabs, .tabbar-mobile { display: none !important; }
}

/* Category filter */
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.cat-btn {
  padding: 5px 14px; border-radius: 20px; border: 1.5px solid #9fa8da;
  background: white; font-size: 0.82rem; cursor: pointer; transition: all 0.12s; color: #3949ab;
}
.cat-btn.active { background: #1a237e; color: white; border-color: #1a237e; }
.cat-btn:hover:not(.active) { background: #e8eaf6; }

/* Score bar */
#score-bar {
  background: white; border-radius: 10px; padding: 14px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 18px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.score-nums { font-size: 1.1rem; font-weight: 600; color: #1a237e; }
.score-sub { font-size: 0.78rem; color: #888; }
.streak { font-size: 0.9rem; color: #e65100; font-weight: 600; }
#progress-bar {
  width: 100%; height: 6px; background: #e8eaf6; border-radius: 3px; margin-top: 6px; overflow: hidden;
}
#progress-fill { height: 100%; background: #3949ab; border-radius: 3px; transition: width 0.3s; width: 0; }

/* Quiz card */
#quiz-card {
  background: white; border-radius: 14px; padding: 30px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 18px; text-align: center;
}
#play-btn {
  width: 80px; height: 80px; border-radius: 50%; background: #1a237e; color: white;
  border: none; font-size: 2.2rem; cursor: pointer; margin: 0 auto 8px;
  display: flex; align-items: center; justify-content: center; transition: background 0.12s, transform 0.12s;
}
#play-btn:hover { background: #0d1b6e; transform: scale(1.05); }
#play-slow, #play-rich {
  background: none; border: 1px solid #9fa8da; color: #3949ab;
  padding: 4px 12px; border-radius: 14px; font-size: 0.78rem; cursor: pointer;
  transition: background 0.12s;
}
#play-slow:hover { background: #e8eaf6; }
#play-rich { border-color: #ffca28; color: #7a5200; background: #fffaf0; }
#play-rich:hover { background: #fff3cd; }
.play-row-sub { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 22px; }

#options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 420px; margin: 0 auto; }
.opt {
  background: white; border: 2px solid #c5cae9; border-radius: 10px;
  padding: 14px 8px; font-size: 1.3rem; cursor: pointer; transition: all 0.12s; line-height: 1.2;
}
.opt:hover:not(:disabled) { border-color: #1a237e; background: #e8eaf6; }
.opt.correct { border-color: #2e7d32 !important; background: #e8f5e9 !important; color: #2e7d32; }
.opt.wrong   { border-color: #c62828 !important; background: #ffebee !important; color: #c62828; }
.opt .opt-meaning { display: block; font-size: 0.68rem; color: #aaa; margin-top: 3px; }

/* Answer reveal */
#reveal {
  margin-top: 18px; padding: 14px; background: #f3f4ff; border-radius: 8px;
  border: 1px solid #c5cae9; display: none; text-align: left;
}
#reveal .rv-word { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
#reveal .rv-row { font-size: 0.85rem; color: #555; margin-bottom: 2px; }
#reveal .rv-pitch { margin-top: 8px; }
#reveal .pitch-label { font-size: 0.72rem; color: #888; margin-bottom: 4px; }
.rv-pd { display: flex; align-items: flex-end; gap: 5px; height: 44px; }
.rv-pm { display: flex; flex-direction: column; align-items: center; }
.rv-pm.hi { justify-content: flex-end; }
.rv-pm.lo { justify-content: flex-end; padding-top: 18px; }
.rv-pm-box {
  width: 28px; height: 24px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
}
.rv-pm.hi .rv-pm-box { background: #7b1fa2; color: white; }
.rv-pm.lo .rv-pm-box { background: #e0e0e0; color: #555; }

#feedback-text { font-size: 1rem; font-weight: 500; min-height: 24px; margin-top: 12px; }

/* Buttons */
#next-btn {
  display: none; margin: 0 auto; padding: 11px 28px; background: #1a237e; color: white;
  border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.12s;
}
#next-btn:hover { background: #0d1b6e; }
.btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
.btn-outline { background: white; color: #1a237e; border: 1.5px solid #9fa8da; }
.btn-outline:hover { background: #e8eaf6; }

/* End screen */
#end-screen {
  display: none; background: white; border-radius: 14px; padding: 32px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center;
}
#end-screen h2 { font-size: 1.4rem; margin-bottom: 8px; color: #1a237e; }
#end-summary { font-size: 0.95rem; color: #555; margin-bottom: 20px; line-height: 1.7; }
#review-list { text-align: left; margin-bottom: 20px; }
#review-list h3 { font-size: 0.9rem; color: #888; margin-bottom: 8px; }
.review-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.88rem;
}
.review-item span.rw { font-size: 1.1rem; min-width: 60px; }

#speak-try-btn {
  background: white; border: 1.5px solid #9fa8da; color: #3949ab;
  padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; cursor: pointer;
  transition: all 0.12s;
}
#speak-try-btn:hover:not(:disabled) { background: #e8eaf6; }
#speak-try-btn.listening { background: #ffebee; border-color: #c62828; color: #c62828; }
#speak-try-btn:disabled { opacity: 0.45; cursor: default; }
.sr-exact   { color: #2e7d32; font-weight: 600; }
.sr-close   { color: #e65100; font-weight: 600; }
.sr-partial { color: #bf360c; font-weight: 600; }
.sr-miss    { color: #b71c1c; font-weight: 600; }

/* ── MOBILE (≤600px) ── */
@media (max-width: 600px) {
  header {
    padding: 10px 12px; padding-top: calc(10px + env(safe-area-inset-top));
    gap: 6px; flex-wrap: nowrap;  /* keep header on one row */
  }
  header h1 { font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header > div:first-child { gap: 10px; flex: 1; min-width: 0; }
  /* Voice picker: keep compact, hide the 'Voice:' label — the select is self-explanatory */
  #voice-row { font-size: 0.75rem; gap: 5px; flex-shrink: 0; }
  #voice-row label { display: none; }
  #voice-select { max-width: 118px; font-size: 0.75rem; }
  .home-btn { font-size: 0.78rem; padding: 6px 12px; min-height: 34px;
              display: inline-flex; align-items: center; }

  .container { padding: 14px 10px;
                padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  .filter-bar { gap: 6px; margin-bottom: 14px; }
  .cat-btn { font-size: 0.78rem; padding: 7px 13px; min-height: 34px; }

  /* Score bar: 2-column grid so streak/reset don't wrap awkwardly */
  #score-bar {
    padding: 11px 14px;
    display: grid; grid-template-columns: 1fr auto; align-items: center;
    column-gap: 10px; row-gap: 6px;
  }
  #score-bar > div:nth-child(1) { grid-column: 1; grid-row: 1; }
  #score-bar > div:nth-child(2) { grid-column: 2; grid-row: 1; justify-self: end; }
  #score-bar > #progress-bar   { grid-column: 1 / -1; grid-row: 2; margin-top: 2px; }
  .score-nums { font-size: 1rem; }
  .score-sub  { font-size: 0.78rem; }
  .streak     { font-size: 0.82rem; }

  #quiz-card { padding: 22px 16px; }
  #play-btn  { width: 64px; height: 64px; font-size: 1.8rem; }
  #play-slow, #play-rich { padding: 8px 16px; min-height: 36px; font-size: 0.82rem; }
  .play-row-sub { margin-bottom: 16px; }

  #options-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .opt { font-size: 1.1rem; padding: 12px 6px; min-height: 52px; }
  .opt .opt-meaning { font-size: 0.78rem; }

  #reveal { padding: 11px; }
  #reveal .rv-word { font-size: 1.15rem; }
  .rv-pm-box { width: 24px; height: 22px; font-size: 0.78rem; }

  #next-btn { padding: 12px 22px; font-size: 0.9rem; min-height: 44px; }
  #end-screen { padding: 24px 16px; }
  #end-screen h2 { font-size: 1.2rem; }

  /* Tactile tap feedback on interactive elements */
  .opt:active, .cat-btn:active, .home-btn:active,
  #play-btn:active, #play-slow:active, #next-btn:active,
  #reset-btn:active, #speak-try-btn:active, .btn:active {
    transform: scale(0.96); transition: transform 80ms;
  }
}
</style>

<!-- Gemini helper inlined as a classic script so no separate file needs to
     load, parse, and register globals. iOS Safari (installed PWA) has
     intermittently failed on both `<script type="module">` and classic
     `<script src="/js/gemini.js">` for this file — inlining sidesteps the
     entire fetch/parse path and the service-worker cache. -->
<script>
(function (root) {
  var CACHE_PREFIX = 'gemini-cache/';
  var DEFAULT_TTL_DAYS = 7;
  function cacheGet(key) {
    try {
      var raw = localStorage.getItem(CACHE_PREFIX + key);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      if (typeof parsed.exp === 'number' && parsed.exp < Date.now()) {
        localStorage.removeItem(CACHE_PREFIX + key);
        return null;
      }
      return parsed.value;
    } catch (_e) { return null; }
  }
  function cacheSet(key, value, ttlDays) {
    try {
      var exp = Date.now() + ttlDays * 86400000;
      localStorage.setItem(CACHE_PREFIX + key, JSON.stringify({ value: value, exp: exp }));
    } catch (_e) {}
  }
  function askGemini(prompt, opts) {
    opts = opts || {};
    var ttlDays = typeof opts.ttlDays === 'number' ? opts.ttlDays : DEFAULT_TTL_DAYS;
    if (opts.cacheKey && opts.bypassCache !== true) {
      var hit = cacheGet(opts.cacheKey);
      if (hit !== null) return Promise.resolve(hit);
    }
    var body = { prompt: prompt };
    if (opts.schema) body.schema = opts.schema;
    if (typeof opts.temperature === 'number') body.temperature = opts.temperature;
    if (opts.model) body.model = opts.model;
    return fetch('/api/gemini', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: opts.signal
    }).then(function (res) {
      if (!res.ok) {
        return res.json().then(
          function (j) { throw new Error('Gemini request failed: ' + (j && j.error || res.status)); },
          function () { throw new Error('Gemini request failed: HTTP ' + res.status); }
        );
      }
      return res.json();
    }).then(function (data) {
      if (opts.cacheKey) cacheSet(opts.cacheKey, data.text, ttlDays);
      return data.text;
    });
  }
  root.askGemini = askGemini;
  root.clearGeminiCache = function (k) { try { localStorage.removeItem(CACHE_PREFIX + k); } catch (_e) {} };
  root.clearAllGeminiCache = function () {
    try {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf(CACHE_PREFIX) === 0) keys.push(k);
      }
      for (var j = 0; j < keys.length; j++) localStorage.removeItem(keys[j]);
    } catch (_e) {}
  };
})(window);
</script>
<script type="module">
import { createSRS } from '/js/srs.js';
const askGemini = window.askGemini;

// ═══════════════════════════════════════════════════════════════════════
// VOCABULARY DATA — loaded from /data/vocab-n5n4.json
// Entry shape: { h, k, e, cat, p, level: 'N5'|'N4' }
// Example sentences are generated on-demand via Gemini (cached per word).
// ═══════════════════════════════════════════════════════════════════════
let VOCAB = [];

// ═══════════════════════════════════════════════════════════════════════
// VOICE — auto-selects Gemini TTS (deployed) or Web Speech (local)
// ═══════════════════════════════════════════════════════════════════════

const USE_GEMINI = location.hostname !== 'localhost' && location.hostname !== '';

// ── Web Speech (local fallback) ──
let jaVoice = null;

function loadVoices() {
  if (USE_GEMINI) return;
  const all = speechSynthesis.getVoices();
  const jaVoices = all.filter(v => v.lang && v.lang.startsWith('ja'));
  const sel = document.getElementById('voice-select');
  if (!jaVoices.length) return;
  sel.innerHTML = '';
  jaVoices.forEach(v => {
    const o = document.createElement('option');
    o.value = v.name; o.textContent = v.name;
    sel.appendChild(o);
  });
  const preferred = jaVoices.find(v => v.name.includes('Google') && v.lang === 'ja-JP')
    || jaVoices.find(v => v.name.includes('Nanami'))
    || jaVoices.find(v => v.name.includes('Haruka'))
    || jaVoices[0];
  jaVoice = preferred;
  sel.value = preferred.name;
  sel.addEventListener('change', () => { jaVoice = jaVoices.find(v => v.name === sel.value) || preferred; });
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

if (USE_GEMINI) {
  document.addEventListener('DOMContentLoaded', () => {
    const vr = document.getElementById('voice-row');
    if (vr) vr.innerHTML = '<span style="font-size:0.82rem;opacity:0.9;">✨ Gemini TTS</span>';
  });
}

// ── Gemini TTS ──
let _audioCtx = null;
let _currentSource = null;
let _currentAbort = null;

function _getAudioCtx() {
  // iOS puts the AudioContext into 'interrupted' after the PWA is
  // backgrounded; ctx.resume() alone doesn't always recover from that
  // state. Treat interrupted/closed as "need a fresh context" and
  // rebuild — callers then await resume() to un-suspend the new one.
  const dead = !_audioCtx
    || _audioCtx.state === 'closed'
    || _audioCtx.state === 'interrupted';
  if (dead) {
    try { _audioCtx && _audioCtx.close(); } catch (e) {}
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    _ctxUnlocked = false; // new ctx needs a fresh gesture unlock
  }
  return _audioCtx;
}

// iOS Safari unlock: create + resume AudioContext on the very first user
// gesture anywhere on the page, and play a 1-sample silent buffer. Without
// this, AudioContext stays 'suspended' / 'interrupted' and later resume()
// calls from inside async handlers lose their gesture token.
let _ctxUnlocked = false;
function _unlockOnGesture() {
  if (_ctxUnlocked) return;
  try {
    const ctx = _getAudioCtx();
    ctx.resume();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    _ctxUnlocked = true;
  } catch(e) {}
}
['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(evt => {
  document.addEventListener(evt, _unlockOnGesture, { passive: true, capture: true });
});

// When the PWA comes back to foreground after being backgrounded, pre-emptively
// rebuild/resume the audio context so the NEXT tap on ▶ finds a running ctx
// (no silent first click).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    try { _getAudioCtx().resume(); } catch (e) {}
  }
});
// Free the audio context on page hide so navigating between quiz/phrases/etc
// doesn't leak dangling AudioContexts on iOS.
window.addEventListener('pagehide', () => {
  try { if (_currentSource) _currentSource.stop(); } catch (e) {}
  try { if (_audioCtx) _audioCtx.close(); } catch (e) {}
  _audioCtx = null; _currentSource = null;
});

function _stopGeminiAudio() {
  if (_currentSource) { try { _currentSource.stop(); } catch(e) {} _currentSource = null; }
  if (_currentAbort) { _currentAbort.abort(); _currentAbort = null; }
}

async function speakGemini(text, opts) {
  opts = opts || {};
  _stopGeminiAudio();
  const ctx = _getAudioCtx();
  if (ctx.state !== 'running') { try { await ctx.resume(); } catch(e) {} }

  const ac = new AbortController();
  _currentAbort = ac;
  let data;
  try {
    const body = { text };
    if (opts.model) body.model = opts.model;
    const res = await fetch('/api/tts', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: ac.signal
    });
    data = await res.json();
  } catch(e) {
    if (e.name === 'AbortError') return;
    console.warn('Gemini TTS failed, falling back:', e);
    speakWebSpeech(text, 0.9); return;
  }
  if (ac.signal.aborted) return;
  if (!data.audio) { console.warn('No audio from Gemini TTS', data); speakWebSpeech(text, 0.9); return; }
  // Decode once; we may need to retry into a freshly-built ctx if the
  // current one was torn down while the fetch was in flight.
  const bytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
  const pcm = new Int16Array(bytes.buffer);
  async function _playInto(activeCtx) {
    if (activeCtx.state !== 'running') { try { await activeCtx.resume(); } catch(e) {} }
    const buf = activeCtx.createBuffer(1, pcm.length, 24000);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < pcm.length; i++) ch[i] = pcm[i] / 32768;
    const src = activeCtx.createBufferSource();
    src.buffer = buf;
    src.connect(activeCtx.destination);
    src.start();
    _currentSource = src;
  }
  try {
    await _playInto(ctx);
  } catch (err) {
    // Context went dead between fetch and start — rebuild and retry once.
    console.warn('TTS playback failed, rebuilding ctx:', err);
    _audioCtx = null;
    try { await _playInto(_getAudioCtx()); }
    catch (err2) { console.warn('TTS retry failed, falling back:', err2); speakWebSpeech(text, 0.9); }
  }
}

function speakWebSpeech(text, rate) {
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  if (jaVoice) utt.voice = jaVoice;
  utt.rate = rate || 0.9;
  speechSynthesis.speak(utt);
}

function speak(text, rate, opts) {
  if (USE_GEMINI) { speakGemini(text, opts); return; }
  speakWebSpeech(text, rate);
}

// STATE
// ═══════════════════════════════════════════════════════════════════════
let pool = [];           // current filtered pool
// Persistent SRS keyed by word.h (stable across category changes and reloads).
const srs = createSRS('n5n4-vocab');
let seenWords = new Set();
let currentWord = null;
let currentSentence = null; // {ja, en} from Gemini, populated on reveal
let answered = false;
let correct = 0;
let total = 0;
let streak = 0;
let wrongWords = [];     // {word, yourAnswer} for review
let activeCat = localStorage.getItem('quiz/cat') || 'all';
let activeLevel = localStorage.getItem('quiz/level') || 'all';
const SESSION_LENGTH = 20;

// Friendly display names for category chips.
const CAT_LABELS = {
  greeting: 'Greetings', time: 'Time', verb: 'Verbs',
  'i-adj': 'i-adj', 'na-adj': 'na-adj', noun: 'Nouns',
  adverb: 'Adverbs', counter: 'Counters',
  particle: 'Particles', expression: 'Expressions',
};

function applyFilters() {
  return VOCAB.filter(w =>
    (activeLevel === 'all' || w.level === activeLevel) &&
    (activeCat === 'all' || w.cat === activeCat)
  );
}

function rebuildCategoryBar() {
  const bar = document.getElementById('filter-bar');
  const inLevel = activeLevel === 'all' ? VOCAB : VOCAB.filter(w => w.level === activeLevel);
  const cats = [...new Set(inLevel.map(w => w.cat))].sort();
  bar.innerHTML = '';
  const mk = (val, label) => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (activeCat === val ? ' active' : '');
    b.dataset.cat = val;
    b.textContent = label;
    bar.appendChild(b);
  };
  mk('all', 'All');
  cats.forEach(c => mk(c, CAT_LABELS[c] || c));
  // If the previously-selected category isn't in the new level, fall back to 'all'.
  if (activeCat !== 'all' && !cats.includes(activeCat)) {
    activeCat = 'all';
    localStorage.setItem('quiz/cat', 'all');
    bar.querySelector('[data-cat="all"]').classList.add('active');
  }
}

function initPool() {
  pool = applyFilters();
  seenWords.clear();
  correct = 0; total = 0; streak = 0; wrongWords = [];
  updateScore();
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  if (!pool.length) {
    document.getElementById('feedback-text').textContent = 'No words match this filter.';
    document.getElementById('options-grid').innerHTML = '';
    return;
  }
  nextQuestion();
}

function pickWord() {
  // Weighted random via shared SRS module (keyed by word.h).
  const ids = pool.map(w => w.h);
  const pickedId = srs.pickNext(ids);
  const idx = pool.findIndex(w => w.h === pickedId);
  return idx >= 0 ? idx : 0;
}

// ═══════════════════════════════════════════════════════════════════════
// QUIZ LOGIC
// ═══════════════════════════════════════════════════════════════════════
function nextQuestion() {
  if (total >= SESSION_LENGTH) { showEndScreen(); return; }

  answered = false;
  currentSentence = null;
  document.getElementById('feedback-text').textContent = '';
  document.getElementById('reveal').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('speak-result').innerHTML = '';

  const idx = pickWord();
  currentWord = { word: pool[idx], idx };
  seenWords.add(pool[idx].h);

  // 4 options: correct + 3 distractors (same category preferred)
  const distractors = [];
  const sameCat = pool.filter((w, i) => i !== idx && w.h !== pool[idx].h);
  const shuffled = sameCat.sort(() => Math.random() - 0.5);
  while (distractors.length < 3 && shuffled.length > distractors.length) {
    distractors.push(shuffled[distractors.length]);
  }
  const opts = [pool[idx], ...distractors].sort(() => Math.random() - 0.5);

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  opts.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `${w.h}<span class="opt-meaning"></span>`;
    btn.addEventListener('click', () => answerQuestion(btn, w.h === pool[idx].h, w));
    grid.appendChild(btn);
  });

  // Auto-play — but only after the user has interacted at least once.
  // On iOS a pre-gesture speak() wedges the AudioContext in 'suspended'
  // and the first manual Play click comes up silent.
  if (_ctxUnlocked) {
    setTimeout(() => speak(pool[idx].h, 0.9), 300);
  }
}

function answerQuestion(btn, isCorrect, chosen) {
  if (answered) return;
  answered = true;
  total++;

  const word = currentWord.word;

  if (isCorrect) {
    correct++;
    streak++;
    srs.recordResult(currentWord.word.h, true);
    btn.classList.add('correct');
    document.getElementById('feedback-text').textContent = '✓ Correct!';
    document.getElementById('feedback-text').style.color = '#2e7d32';
  } else {
    streak = 0;
    srs.recordResult(currentWord.word.h, false);
    btn.classList.add('wrong');
    wrongWords.push({ word, yourAnswer: chosen });
    // Highlight correct
    document.querySelectorAll('.opt').forEach(b => {
      if (b.textContent.startsWith(word.h)) b.classList.add('correct');
    });
    document.getElementById('feedback-text').textContent = `✗  The word was: ${word.h}`;
    document.getElementById('feedback-text').style.color = '#c62828';
  }

  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  // Show meaning on all options
  document.querySelectorAll('.opt').forEach(b => {
    const h = b.childNodes[0].textContent.trim();
    const match = pool.find(w => w.h === h);
    if (match) b.querySelector('.opt-meaning').textContent = match.e;
  });

  showReveal(word);
  updateScore();
  document.getElementById('next-btn').style.display = 'block';
}

function showReveal(word) {

      return `<div class="rv-pm ${cls}"><div class="rv-pm-box">${m}</div></div>`;
    }).join('');
    pitchHTML = `
      <div class="rv-pitch">
        <div class="pitch-label">Pitch: <span style="color:#7b1fa2">■ high</span> / <span style="color:#999">■ low</span></div>
        <div class="rv-pd">${boxes}</div>
      </div>`;
  }

  rv.innerHTML = `
    <div class="rv-word">${word.h} 【${word.k}】</div>
    <div class="rv-row">📖 ${word.e}</div>

      <button id="gen-sentence-btn" style="background:#f3e5f5; border:1px solid #ce93d8; border-radius:6px; padding:6px 12px; font-size:0.82rem; cursor:pointer; color:#4a148c;">

// ── Gemini-generated example sentence, cached per word. ──
const SENTENCE_SCHEMA = {
  type: 'object',
  properties: {
    ja: { type: 'string' },
    en: { type: 'string' },
  },
  required: ['ja', 'en'],
};

async function getSentenceFor(word) {
  const raw = await askGemini(
    `Write one short ${word.level || 'N5'}-level Japanese sentence that uses the word ${word.h}${word.k && word.k !== word.h ? ' (written as ' + word.k + ')' : ''} meaning "${word.e}". Keep it under 15 mora, grammatically natural, and suitable for a beginner. Return JSON {ja, en}.`,
    { schema: SENTENCE_SCHEMA, cacheKey: 'vocab/' + word.h, ttlDays: 30 }
  );
  let data = raw;
  if (typeof raw === 'string') { try { data = JSON.parse(raw); } catch { throw new Error('Bad JSON from Gemini'); } }
  if (!data || !data.ja) throw new Error('No sentence returned');
  return data;
}

async function fetchAndShowSentence(word) {
  const slot = document.getElementById('rv-sentence-slot');
  if (slot) slot.innerHTML = '<span style="color:#888;font-size:0.85rem;">✨ Generating example…</span>';
  try {
    const data = await getSentenceFor(word);
    currentSentence = data;
    if (slot) {
      slot.innerHTML = `
        <div class="rv-row" style="margin-bottom:4px;">
          <button id="play-example-btn" style="background:#f3e5f5; border:1px solid #ce93d8; border-radius:6px; padding:4px 10px; font-size:0.85rem; cursor:pointer; color:#4a148c;">▶ ${escapeHTML(data.ja)}</button>
        </div>
        <div class="rv-row" style="font-size:0.78rem; color:#666;">${escapeHTML(data.en || '')}</div>
      `;
      const pb = document.getElementById('play-example-btn');
      if (pb) pb.addEventListener('click', () => speak(data.ja, 0.85));
    }
    speak(data.ja, 0.85);
  } catch (e) {
    if (slot) slot.innerHTML = `<span style="color:#c62828;font-size:0.82rem;">⚠ Couldn't fetch example: ${escapeHTML(e.message || 'unknown')}</span>`;
  }
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

function updateScore() {
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-total').textContent = total;
  document.getElementById('sc-seen').textContent = seenWords.size;
  document.getElementById('sc-pool').textContent = pool.length;
  document.getElementById('sc-pct').textContent = total ? `(${Math.round(correct/total*100)}%)` : '';
  document.getElementById('sc-streak').textContent = streak >= 3 ? `🔥 ${streak} streak!` : '';
  document.getElementById('progress-fill').style.width = `${(total / SESSION_LENGTH) * 100}%`;
}

async function bootstrap() {
  let res;
  try {
    res = await fetch('/data/vocab-n5n4.json', { cache: 'no-cache' });
  } catch (e) {
    showBootError('network error — ' + (e.message || 'fetch rejected'));
    return;
  }
  if (!res.ok) {
    showBootError('HTTP ' + res.status + ' ' + res.statusText);
    return;
  }
  const ct = res.headers.get('content-type') || '';
  const body = await res.text();
  if (!ct.includes('json') && !body.trim().startsWith('[')) {
    // Cloudflare Access may have returned a login page instead of JSON.
    showBootError('Got ' + ct + ' instead of JSON (first 80 chars: ' + body.slice(0,80) + ')');
    return;
  }
  try {
    VOCAB = JSON.parse(body);
  } catch (e) {
    showBootError('JSON parse failed — ' + e.message);
    return;
  }
  if (!Array.isArray(VOCAB) || VOCAB.length === 0) {
    showBootError('Vocab array was empty');
    return;
  }
  // Restore level toggle active state from localStorage.
  document.querySelectorAll('#level-bar .cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.level === activeLevel);
  });
  rebuildCategoryBar();
  initPool();
}
bootstrap();

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
let quizRec = null;
const speakBtn = document.getElementById('speak-try-btn');
const speakResult = document.getElementById('speak-result');

if (SpeechRecognition) {

}

function getSupportedMimeType() {
  // iOS Safari only supports audio/mp4 (AAC). Put it first so iPhones
  // don't fall through to an empty mimeType and a broken MediaRecorder.
  const types = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/aac'];
  for (const t of types) {
    if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function recordAndTranscribe(durationMs = 3000) {
  const mimeType = getSupportedMimeType();
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return new Promise((resolve, reject) => {
    const chunks = [];
    const rec = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    rec.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: mimeType || 'audio/webm' });
      const reader = new FileReader();
      reader.onloadend = async () => {
        const base64 = reader.result.split(',')[1];
        try {
          const res = await fetch('/api/stt', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audio: base64, mimeType: mimeType || 'audio/webm' })
          });
          const ct = res.headers.get('content-type') || '';
          if (!ct.includes('application/json')) {
            reject(new Error('Auth session expired — reload the page and try again.'));
            return;
          }
          const data = await res.json();
          if (!res.ok) { reject(new Error(data.error || `STT server error ${res.status}`)); return; }
          resolve(data.transcript || '');
        } catch (e) { reject(e); }
      };
      reader.readAsDataURL(blob);
    };
    rec.start();
    setTimeout(() => rec.stop(), durationMs);
  });
}

function katakanaToHiragana(str) {
  return str.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}

// Map counter+digit tokens (both arabic "6月" and kanji "六月") to their
// Japanese reading so the grader treats them as equivalent to the hiragana
// form. Without this, Gemini STT returning "6月" fails to match expected
// "ろくがつ". Covers the most common date/time counters; anything unknown
// falls through untouched.
const JA_DIGIT_TABLE = (function () {
  const months = ['いちがつ','にがつ','さんがつ','しがつ','ごがつ','ろくがつ','しちがつ','はちがつ','くがつ','じゅうがつ','じゅういちがつ','じゅうにがつ'];
  const hours  = ['いちじ','にじ','さんじ','よじ','ごじ','ろくじ','しちじ','はちじ','くじ','じゅうじ','じゅういちじ','じゅうにじ'];
  const days = [
    'ついたち','ふつか','みっか','よっか','いつか','むいか','なのか','ようか','ここのか','とおか',
    'じゅういちにち','じゅうににち','じゅうさんにち','じゅうよっか','じゅうごにち','じゅうろくにち','じゅうしちにち','じゅうはちにち','じゅうくにち','はつか',
    'にじゅういちにち','にじゅうににち','にじゅうさんにち','にじゅうよっか','にじゅうごにち','にじゅうろくにち','にじゅうしちにち','にじゅうはちにち','にじゅうくにち','さんじゅうにち','さんじゅういちにち'
  ];
  const kanjiDigit = { 1:'一', 2:'二', 3:'三', 4:'四', 5:'五', 6:'六', 7:'七', 8:'八', 9:'九',
                       10:'十', 11:'十一', 12:'十二', 13:'十三', 14:'十四', 15:'十五', 16:'十六', 17:'十七', 18:'十八', 19:'十九',
                       20:'二十', 21:'二十一', 22:'二十二', 23:'二十三', 24:'二十四', 25:'二十五', 26:'二十六', 27:'二十七', 28:'二十八', 29:'二十九', 30:'三十', 31:'三十一' };
  const table = [];
  function push(arabic, kanji, reading) {
    table.push([arabic, reading], [kanji, reading]);
  }
  for (let i = 1; i <= 12; i++) push(i + '月', kanjiDigit[i] + '月', months[i-1]);
  for (let i = 1; i <= 12; i++) push(i + '時', kanjiDigit[i] + '時', hours[i-1]);
  for (let i = 1; i <= 31; i++) push(i + '日', kanjiDigit[i] + '日', days[i-1]);
  // Standalone digits (when STT returns "0" / "3" instead of ゼロ / さん).
  // The longest-first sort below puts counter forms ("6月", 2 chars) ahead
  // of these (1 char), so "6月" → ろくがつ, not ろく+月.
  const standaloneDigits = {
    0: 'ぜろ', 1: 'いち', 2: 'に', 3: 'さん', 4: 'よん',
    5: 'ご', 6: 'ろく', 7: 'なな', 8: 'はち', 9: 'きゅう', 10: 'じゅう'
  };
  for (const [n, reading] of Object.entries(standaloneDigits)) {
    table.push([String(n), reading]);
    if (kanjiDigit[n]) table.push([kanjiDigit[n], reading]);
  }
  // 零 (kanji zero, rare but possible).
  table.push(['零', 'ぜろ']);
  // Longest-token-first replacement prevents "1月" eating from "12月".
  table.sort((a, b) => b[0].length - a[0].length);
  return table;
})();

function normalizeJaDigits(str) {
  // Full-width digits → half-width so "６月" normalises same as "6月".
  let out = String(str).replace(/[\uFF10-\uFF19]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  for (const [token, reading] of JA_DIGIT_TABLE) {
    if (out.indexOf(token) !== -1) out = out.split(token).join(reading);
  }
  return out;
}

function cleanJP(str) {
  // Strip punctuation, spaces, common sentence-end markers; convert digit
  // counters to hiragana reading so "6月" matches "ろくがつ".
  return katakanaToHiragana(normalizeJaDigits(str.trim()).replace(/[。、！？!?\s]/g, ''));
}

function srCompare(expectedHiragana, heard, expectedKanji) {
  const e = cleanJP(expectedHiragana);
  const h = cleanJP(heard);

  // Match against hiragana form
  if (h === e || h.includes(e) || e.includes(h)) return 'exact';

  // Match against kanji form — recognizer often returns kanji (e.g. 話す for はなす).
  // Run normalizeJaDigits on both sides so "2人" matches "二人" (STT often
  // digitises spoken number-words).
  if (expectedKanji) {
    const k = normalizeJaDigits(expectedKanji.trim().replace(/[。、！？!?\s]/g, ''));
    const hRaw = normalizeJaDigits(heard.trim().replace(/[。、！？!?\s]/g, ''));
    if (hRaw === k || hRaw.includes(k) || k.includes(hRaw)) return 'exact';
  }

  // Character overlap on hiragana
  let overlap = 0;
  for (let i = 0; i < Math.min(e.length, h.length); i++) {
    if (e[i] === h[i]) overlap++;
  }
  const ratio = overlap / e.length;
  if (ratio >= 0.7) return 'close';
  if (ratio >= 0.4) return 'partial';
  return 'miss';
}

function quizShowResult(alternatives) {
  let bestLevel = 'miss';
  let bestAlt = alternatives[0];
  for (const alt of alternatives) {
    const lv = srCompare(currentWord.word.h, alt, currentWord.word.k);
    if (['exact','close','partial','miss'].indexOf(lv) <
        ['exact','close','partial','miss'].indexOf(bestLevel)) {
      bestLevel = lv; bestAlt = alt;
    }
  }
  const cfg = {
    exact:   { cls: 'sr-exact',   icon: '✓', label: 'Great match!' },
    close:   { cls: 'sr-close',   icon: '~', label: 'Close — keep going!' },
    partial: { cls: 'sr-partial', icon: '△', label: 'Partial — try again' },
    miss:    { cls: 'sr-miss',    icon: '✗', label: 'Not recognised — try again' },
  }[bestLevel];
  speakResult.innerHTML =
    `<span class="${cfg.cls}">${cfg.icon} ${cfg.label}</span>
     <span style="color:#888; margin-left:8px;">You said: <strong>${bestAlt}</strong></span>`;
}

speakBtn.addEventListener('click', async () => {
  if (!currentWord) return;
  speakBtn.textContent = '🔴 Listening…';
  speakBtn.classList.add('listening');
  speakBtn.disabled = true;
  speakResult.innerHTML = '<span style="color:#888;">Listening… say the word now</span>';

  if (!quizRec && isMobile) {
    try {
      const transcript = await recordAndTranscribe(3000);
      quizShowResult([transcript]);
    } catch (e) {
      speakResult.innerHTML = `<span style="color:#c62828;">⚠ ${e.message || 'Mic error — check permissions'}</span>`;
    }
    speakBtn.textContent = '🎤 Say it aloud';
    speakBtn.classList.remove('listening');
    speakBtn.disabled = false;
    return;
  }

  if (!quizRec) return;

  // Fallback used when Web Speech returns `network` (Google STT blocked
  // by firewall / region / privacy settings). Records mic audio and sends
  // it to our /api/stt endpoint instead.
  let usedServerFallback = false;
  async function runServerFallback() {
    if (usedServerFallback) return;
    usedServerFallback = true;
    speakResult.innerHTML = '<span style="color:#888;">Google STT blocked — retrying via server…</span>';
    try {
      const transcript = await recordAndTranscribe(3000);
      quizShowResult([transcript]);
    } catch (e) {
      speakResult.innerHTML = `<span style="color:#c62828;">⚠ ${e.message || 'Mic error'}</span>`;
    }
    speakBtn.textContent = '🎤 Say it aloud';
    speakBtn.classList.remove('listening');
    speakBtn.disabled = false;
  }

  quizRec.onresult = (ev) => {
    const alternatives = Array.from(ev.results[0]).map(r => r.transcript);
    quizShowResult(alternatives);
  };
  quizRec.onerror = (ev) => {
    if (ev.error === 'network') { runServerFallback(); return; }
    const msgs = {
      'no-speech':   'No speech detected.',
      'not-allowed': 'Mic access denied — check browser settings.',
    };
    speakResult.innerHTML = `<span style="color:#c62828;">⚠ ${msgs[ev.error] || ev.error}</span>`;
  };
  quizRec.onend = () => {
    if (usedServerFallback) return;
    speakBtn.textContent = '🎤 Say it aloud';
    speakBtn.classList.remove('listening');
    speakBtn.disabled = false;
  };
  try { quizRec.start(); } catch (e) { /* already running */ }
});
</script>
<script>
if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
  navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW fail:', err));
}
</script>
